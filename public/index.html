<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spine Project</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/5/54/Cyberpunk_2077_favicon.png"
        type="image/png">


</head>

<body>
    <div class="main">
        <h3>Input something in the field below:</h3>
        <form id="noteForm">
            <label for="inputText">Input text: </label><br>
            <h4 id="serverMessage" style="color:red; margin:4px 0;"></h4>
            <input type="text" id="inputText" name="inputText"><br>
            <div class="buttons">
                <button type="button" id="saveNoteBtn">Save</button>
                <button type="button" id="clearNotesBtn">Clear</button>
                <button type="button" id="loadNotesBtn">Load</button>
                <button type="button" id="saveServerBtn">Save (Server)</button>
                <button type="button" id="clearServerBtn">Clear (Server)</button>
                <button type="button" id="loadServerBtn">Load (Server)</button>
                <button type="button" id="logoutBtn">Logout</button>
            </div>

        </form>
        <div class="lists">
            <ul id="notesList" style="list-style-type:circle">
            </ul>
            <ul id="notesListServer" style="list-style-type:circle">
            </ul>
        </div>
        <table class="notes-table" id="notesTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Text</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="pagination"></div>

    </div>

    <script type="module" src="scripts/index.js"></script>

</body>

</html>
